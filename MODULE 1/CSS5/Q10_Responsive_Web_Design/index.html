<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Local Community Event Portal</h1>

        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="container">

        <div class="event-card">
            <img src="https://picsum.photos/400/250" alt="Event Image">

            <h2>Music Festival</h2>

            <p>
                Join us for exciting music performances and cultural activities.
            </p>
        </div>

        <div class="event-card">
            <img src="https://picsum.photos/401/250" alt="Event Image">

            <h2>Food Carnival</h2>

            <p>
                Enjoy delicious foods and fun-filled community events.
            </p>
        </div>

    </section>

</body>

</html>
